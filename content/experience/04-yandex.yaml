  - text:
      ru: Писал документацию по внешней и внутренней эксплуатации сервисов.
      en: Wrote external and internal operations documentation for services.
    tags: { audience: [hr, technical] }
  - text:
      ru: Дорабатывал и поддерживал платформу заказа и выдачи серверов под нужды сервисов компании.
      en: Extended and maintained the server ordering and provisioning platform for company services.
    tags: { audience: [hr, technical] }
  - text:
      ru: "Разработал сервис комплектации, разукомплектации и перекомплектации оборудования (серверные компоненты, части беспилотных автомобилей и др.)."
