# LinkedIn — HR + recruiters, оба языка. Markdown удобен для копипасты в профиль.
id: linkedin
label:
  ru: LinkedIn
  en: LinkedIn
languages: [ru, en]
system: linkedin
audience: hr
layout: rich
formats: [html, pdf, md, txt]
sections: [summary, achievements, experience, skills, languages, education]
# LinkedIn ограничивает описание позиции 2000 символами. Пункты, помеченные
# доменным тегом `linkedin-skip`, исключаются только из этого таргета — полные
# версии остаются на сайте/hh/Habr.
select:
  excludeTags: [linkedin-skip]
