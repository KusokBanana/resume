    highlights:
      - text:
          ru: Внедрил AI-assisted development (Claude и аналогичные инструменты) — ускорил разработку в ~1,5 раза за счёт прототипирования, рефакторинга, написания кода и код-ревью.
          en: Introduced AI-assisted development (Claude and similar) — sped up delivery ~1.5× across prototyping, refactoring, coding and code review.
        tags: {}
      - text:
          ru: "Оснастил библиотеку компонентов поддержкой llms.txt — машиночитаемой документацией для LLM-инструментов: AI-ассистенты используют компоненты корректно «из коробки», без ручного контекста."
          en: Added llms.txt support to the component library — machine-readable docs for LLM tools, so AI assistants use components correctly out of the box without manual context.
        tags: { audience: [technical] }
      - text:
          ru: Участвовал в разработке ключевых частей интерфейсов на React и Angular — точечный hands-on в сложных и критичных местах.
          en: Contributed hands-on to key UI parts in React and Angular — targeted work in complex, critical areas.
        tags: {}
      - text:
          ru: Прорабатывал архитектурные решения, проводил код-ревью; владею frontend-архитектурой и стандартами разработки интерфейсов.
          en: Shaped architectural decisions and ran code reviews; strong in frontend architecture and UI development standards.
        tags: { audience: [hr, technical] }
      - text:
          ru: Автоматизировал внутренние процессы и tooling на Python — скрипты, вспомогательные сервисы, оптимизация рутинных операций.
          en: Automated internal processes and tooling in Python — scripts, helper services, routine-operation optimisation.
        tags: { audience: [technical] }
  - title: { ru: Frontend-инфраструктура и FrontOps, en: Frontend infra & FrontOps }
    highlights:
