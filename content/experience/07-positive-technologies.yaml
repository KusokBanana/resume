summary:
  ru: >-
    Frontend-направление продуктов дирекции информационных технологий. В подчинении
    4 кросс-функциональные команды: техлиды, frontend-разработчики и UX/UI-дизайнеры.
    Полная ответственность за направление — от стратегии и найма до технологических
    решений и пользовательского результата. Выступал владельцем интерфейсного
    направления, балансируя интересы бизнеса, пользователей и команды.
  en: >-
    Frontend function across the IT directorate's products. Led 4 cross-functional
    teams: tech leads, frontend engineers and UX/UI designers. Full ownership of the
    function — from strategy and hiring to technical decisions and user outcomes.
    Acted as the owner of the UI domain, balancing business, user and team interests.
groups:
  - title: { ru: Продукты, en: Products }
    highlights:
      - text:
          ru: Руководил полным циклом разработки интерфейсов — от Low-Fidelity-прототипов до промышленного релиза и развития на проде.
          en: Led the full UI lifecycle — from low-fidelity prototypes to production release and ongoing evolution.
        tags: {}
      - text:
          ru: "Вёл интерфейсы продуктов: Корпоративный портал, Партнёрский портал, Aim (автоматизация управления инфраструктурой), Preboarding (найм и онбординг) и ряд менее крупных."
          en: "Owned UIs for: Corporate Portal, Partner Portal, Aim (infrastructure-management automation), Preboarding (hiring and onboarding) and several smaller products."
        tags: {}
      - text:
          ru: Обеспечил стабильную поставку интерфейсных решений для продуктов с активной пользовательской базой.
          en: Ensured stable delivery of UI solutions for products with an active user base.
        tags: { audience: [hr, technical] }
  - title: { ru: Команды и процессы, en: Teams & process }
    highlights:
      - text:
          ru: "Построил frontend-направление с нуля: найм, онбординг, зоны ответственности, стратегия; масштабировал отдел с 0 до 11 человек за год."
          en: "Built the frontend function from scratch: hiring, onboarding, ownership areas, strategy; scaled the department from 0 to 11 people in a year."
        tags: {}
      - text:
          ru: "Принял команды «по наследству»: внедрил процессы, повысил управляемость и прозрачность, выстроил рабочие и доверительные отношения."
          en: "Inherited existing teams: introduced process, improved manageability and transparency, built trust and working relationships."
        tags: {}
      - text:
          ru: Провёл полную замену команды в одном из продуктов с бесшовной интеграцией нового интерфейса на современном стеке — без остановки развития продукта.
          en: Fully replaced a product's team with a seamless migration to a modern-stack UI — without pausing product development.
        tags: { audience: [hr, technical] }
      - text:
          ru: Внедрил процесс дизайн-ревью — число визуальных багов снизилось со стабильных 5–10 до 0–1 на релиз.
          en: Introduced a design-review process — visual bugs dropped from a steady 5–10 to 0–1 per release.
        tags: {}
      - text:
          ru: "Перестроил процесс разработки email-писем: вместо связки «дизайнер + разработчик, ~неделя» — один разработчик за пару часов."
          en: Reworked the email-building process — from "designer + developer, ~a week" to one developer in a couple of hours.
        tags: { audience: [hr, technical] }
  - title: { ru: Люди, en: People }
    highlights:
      - text:
          ru: "Развивал команду через индивидуальные планы развития (ИПР): 3 человека выросли до Senior, 3 — до лидов."
          en: "Grew the team via individual development plans: 3 people reached Senior, 3 became leads."
        tags: {}
      - text:
          ru: Удержал отдел без единого добровольного ухода за 2 года на фоне турбулентности в компании (урезание бюджетов, массовые сокращения); потери — только в рамках общекорпоративного сокращения штата.
          en: Kept the department with zero voluntary attrition over 2 years amid company turbulence (budget cuts, mass layoffs); the only losses were part of company-wide reductions.
        tags: {}
      - text:
          ru: Повысил автономность команд и снизил bus-factor — уменьшил зависимость от отдельных специалистов.
          en: Increased team autonomy and reduced the bus factor — lowered dependence on individual specialists.
        tags: { audience: [hr, technical] }
      - text:
          ru: Принимал сложные управленческие решения, включая расставание с сотрудниками в рамках оптимизации команды.
          en: Made hard management calls, including parting with team members during team optimisation.
        tags: { audience: [hr] }
