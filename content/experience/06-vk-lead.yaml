summary:
  ru: >-
    Финтех ВКонтакте — «Кабинет выплат» (Cashout): полноценный интерфейс
    самостоятельного вывода средств, где авторы выбирают источник заработка
    по монетизациям в соцсети ВКонтакте и выводят нужную сумму. Highload-сервис
    в экосистеме ВКонтакте. Повышение из роли старшего фронтенд-разработчика.
  en: >-
    VK fintech — Cashout: a full self-service money-withdrawal product where
    creators pick a monetisation earnings source on the VKontakte social network
    and cash out the amount they want. A high-load service within the VK ecosystem.
    Promoted from senior frontend developer.
