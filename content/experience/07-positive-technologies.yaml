      - text:
          ru: "Автоматизировал релизный цикл (скрипты + CI/CD): подготовка релиза сократилась с 2 часов до 10 минут."
          en: Automated the release cycle (scripts + CI/CD) — release prep dropped from 2 hours to 10 minutes.
        tags: {}
      - text:
