# Варианты блока "Кратко". compose берёт лучший по priority среди релевантных
# (по audience/system).
variants:
  - id: summary-general
    priority: 10
    tags:
      audience: [hr, technical]
    text:
      ru: >-
        Инженерный руководитель, 10+ лет в IT, более 3 лет в управлении командами.
        Построил frontend-направление в Positive Technologies с нуля до отдела из
        11 человек (4 кросс-функциональные команды). Ранее — Яндекс и VK. Совмещаю
        стратегию, процессы и hands-on разработку на React / Angular / TypeScript.
        В прошлом — fullstack-разработчик: при необходимости берусь и за backend
        (Python, PHP, Node.js). Внедряю AI-assisted development в работу команд —
        ускорил разработку в 1,5 раза.
      en: >-
        Engineering manager with 10+ years in tech and 3+ years leading teams.
        Built the frontend function at Positive Technologies from scratch to an
        11-person department (4 cross-functional teams). Previously at Yandex and VK.
        I combine strategy, process and hands-on development in React / Angular /
        TypeScript. Formerly a full-stack developer — I can take on backend when
        needed (Python, PHP, Node.js). I bring AI-assisted development into team
        workflows — sped up delivery by 1.5×.

  - id: summary-ats
