  - text:
      ru: Разработал платформу ремонта оборудования — полный цикл от заявки до получения отремонтированного оборудования из сервисного центра.
      en: Built an equipment-repair platform — full cycle from request to receiving repaired hardware from the service centre.
    tags: { audience: [hr, technical] }
  - text:
      ru: Разработал интерфейс исполнения заявок в дата-центрах (замена компонентов и серверов).
      en: Built a UI for fulfilling data-centre work orders (component and server replacement).
    tags: { audience: [hr, technical] }
  - text:
      ru: Разработал систему технического учёта материальных активов компании.
      en: Built a technical asset-tracking system for the company's physical assets.
    tags: { audience: [hr, technical] }
  - text:
      ru: Разработал интерфейс автоматизированной инвентаризации производства серверного оборудования на заводе.
      en: Built a UI for automated inventory of server-hardware manufacturing at the factory.
    tags: { audience: [hr, technical] }
  - text:
      ru: Разработал сервис транзакционного изменения состояния оборудования в системах инвентарного и количественного учёта.
      en: Built a service for transactional equipment-state changes across inventory and quantity-accounting systems.
    tags: { audience: [hr, technical] }
  - text:
      ru: "Разработал сервис заказа на закупку и производство серверного оборудования: по минимально необходимой конфигурации подбирает оптимальное по стоимости железо."
      en: "Built a procurement/manufacturing ordering service: from a minimal required configuration it selects the most cost-optimal hardware."
    tags: { audience: [hr, technical] }
